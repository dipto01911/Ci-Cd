name: CICD Pipeline 

on:
  push:
    branches:
      - main



jobs:
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Git Clone 
        uses: actions/checkout@v7

      - name: install node js 
        uses: actions/setup-node@v7
        with:
          node-version: '22'
      
      - name: Install Packages
        run: npm install 

      - name: Run the Test 
        run: npm run test 

      - name: Print The Hello.txt file
        run: cat hello.txt

  Deploy:

    runs-on: self-hosted 
    needs: Test

    steps:
      - name: Create A Folder
        run: |
          cd ~
          pwd
          mkdir ostad
          cd ostad 
          touch hello.txt
          echo "hello world" > hello.txt 
          
