
name: CI-CD Pipeline

on:
  push:
    branches:
      - main
    workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Git Clone
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y nginx
          npm install

      - name: Run Tests
        run: npm test

  Deploy:
    runs-on: ubuntu-latest
    needs: Test

    steps:
      - name: SSH Command
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            sudo apt update
            whoami
            pwd
            sudo mkdir app
            cd app
            sudo git clone https://github.com/dipto01911/Ci-Cd.git .
            sudo apt install -y nodejs npm
            sudo npm install -g pm2
            npm install
            pm2 -v
            sudo npm start
            sudo pm2 start "npm start" --name ="App 5000"
            